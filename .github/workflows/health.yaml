name: Health Check

on:
    workflow_dispatch:
    schedule:
        - cron: '0 0 * * *'

jobs:
    health_check:
        runs-on: ubuntu-latest
        steps:
            - name: Check the deployed service URL
              uses: jtalk/url-health-check-action@v5
              with:
                url: https://fs-bloglist.onrender.com/health

            - name: Notify failure
              uses: sarisia/actions-status-discord@v1
              if: ${{ failure() }}
              with:
                webhook: ${{ secrets.WEBHOOK_URL }}
                content: "❌ Health check failed! Site may be down!"
                title: "Health Check Failed"
                description: |
                    **URL:** https://fs-bloglist.onrender.com
                    **Time:** ${{ github.event.schedule }}